<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circus Adventure - Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }
        
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .container {
            position: relative;
            text-align: center;
            padding: 40px;
            max-width: 900px;
            z-index: 10;
        }
        
        h1 {
            font-size: 4em;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .text-red {
            color: #FF1744;
            display: inline-block;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(255, 23, 68, 0.5);
        }
        
        .text-blue {
            color: #00B0FF;
            display: inline-block;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(0, 176, 255, 0.5);
        }
        
        .text-yellow {
            color: #FFD600;
            display: inline-block;
            font-size: 1.2em;
            text-shadow: 2px 2px 4px rgba(255, 214, 0, 0.5);
        }
        
        .circus-tent {
            position: relative;
            margin: 40px 0;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tent-stripe {
            position: absolute;
            width: 30px;
            height: 150px;
            animation: wave 3s ease-in-out infinite;
        }
        
        .stripe-red { background: #FF1744; left: 10%; }
        .stripe-yellow { background: #FFD600; left: 35%; animation-delay: 0.3s; }
        .stripe-blue { background: #00B0FF; left: 60%; animation-delay: 0.6s; }
        
        @keyframes wave {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.8); }
        }
        
        .message {
            font-size: 2.5em;
            font-weight: 900;
            line-height: 1.4;
            margin: 30px 0;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.8);
        }
        
        .sparkles {
            display: inline-block;
            animation: sparkle 1.5s infinite;
            margin: 0 10px;
        }
        
        @keyframes sparkle {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 0.7; }
        }
        
        .decorative {
            font-size: 3em;
            margin: 20px 0;
            animation: rotate 4s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .clown-image {
            max-width: 400px;
            width: 100%;
            margin: 40px 0;
            filter: drop-shadow(0 10px 30px rgba(255, 23, 68, 0.4));
            animation: bounce-clown 2.5s ease-in-out infinite;
        }
        
        @keyframes bounce-clown {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-2deg); }
            75% { transform: translateY(-20px) rotate(2deg); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <div class="circus-tent">
            <div class="tent-stripe stripe-red"></div>
            <div class="tent-stripe stripe-yellow"></div>
            <div class="tent-stripe stripe-blue"></div>
        </div>
        
        <h1>🎪 CIRCUS ADVENTURE 🎪</h1>
        
        <div class="message">
            <span class="text-red">Hello</span>
            <span class="sparkles">✨</span>
            <span class="text-blue">my</span>
            <span class="sparkles">✨</span>
            <span class="text-yellow">dear!</span>
            <br>
            <span class="text-yellow">Looking</span>
            <span class="sparkles">✨</span>
            <span class="text-red">for</span>
            <span class="sparkles">✨</span>
            <span class="text-blue">an</span>
            <span class="sparkles">✨</span>
            <span class="text-yellow">adventure</span>

    <script>
        // Generate random stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }
    </script>
